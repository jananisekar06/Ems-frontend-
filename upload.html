<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>File Upload</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

<h1 class="text-3xl font-bold text-indigo-700 mb-6">
📁 File Upload
</h1>

<input
type="file"
class="border w-full p-3 rounded">

<button
class="bg-indigo-600 text-white w-full mt-5 p-3 rounded hover:bg-indigo-700"
onclick="uploadFile()">
Upload
</button>

</div>

<script>
function uploadFile(){
alert("File Uploaded Successfully");
}
</script>
<script src="js/upload.js"></script>
</body>
</html>
