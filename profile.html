<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMS - Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <script>
    if(localStorage.getItem('ems_auth')!== 'true' &&!window.location.pathname.includes('index.html')) {
      window.location.href = 'index.html';
    }
    const user = JSON.parse(localStorage.getItem('ems_user') || '{}');
  </script>

  <div class="flex min-h-screen">
    <div id="overlay" class="hidden lg:hidden fixed inset-0 bg-black/50 z-40" onclick="toggleSidebar()"></div>

    <div id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 transform -translate-x-full lg:translate-x-0 transition duration-300">
      <div class="p-6 border-b border-slate-700">
        <h2 class="text-2xl font-bold text-white">EMS</h2>
        <p class="text-slate-400 text-sm">Employee System</p>
      </div>
      <nav class="p-4 space-y-2">
        <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800">📊 Dashboard</a>
        <a href="attendance.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800">⏰ Attendance</a>
        <a href="leave.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800">📅 Leave</a>
        <a href="employees.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800">👥 Employees</a>
        <a href="tasks.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800">✅ Tasks</a>
        <a href="hr.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800">💼 HR</a>
        <a href="profile.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-indigo-600 text-white">👤 Profile</a>
        <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-slate-800 mt-8">🚪 Logout</button>
      </nav>
    </div>

    <div class="flex-1 lg:ml-64">
      <div class="topbar px-4 sm:px-8 py-4 bg-white shadow-sm flex justify-between items-center">
        <div class="flex items-center gap-4">
          <button onclick="toggleSidebar()" class="lg:hidden p-2 bg-indigo-600 text-white rounded-lg">☰</button>
          <h2 class="text-xl sm:text-2xl font-bold text-slate-800">My Profile</h2>
        </div>
        <span class="text-sm sm:text-base text-slate-600">Welcome, <span id="userName">Admin</span></span>
      </div>

      <div class="p-4 sm:p-8 max-w-4xl mx-auto">
        <div class="bg-white rounded-2xl shadow-lg p-8">
          <div class="flex flex-col sm:flex-row items-center gap-6 mb-8">
            <div class="w-24 h-24 bg-indigo-600 rounded-full flex items-center justify-center text-white text-4xl font-bold">
              <span id="avatar">A</span>
            </div>
            <div>
              <h1 class="text-3xl font-bold text-slate-800" id="profileName">Admin User</h1>
              <p class="text-slate-600" id="profileRole">System Administrator</p>
            </div>
          </div>

          <form id="profileForm" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
              <label class="text-sm font-medium text-slate-700 mb-2 block">Full Name</label>
              <input type="text" id="pName" class="w-full px-4 py-3 border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-600" required />
            </div>
            <div>
              <label class="text-sm font-medium text-slate-700 mb-2 block">Email</label>
              <input type="email" id="pEmail" class="w-full px-4 py-3 border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-600" required />
            </div>
            <div>
              <label class="text-sm font-medium text-slate-700 mb-2 block">Phone</label>
              <input type="tel" id="pPhone" placeholder="+91 98765 43210" class="w-full px-4 py-3 border-slate-300 rounded-xl" />
            </div>
            <div>
              <label class="text-sm font-medium text-slate-700 mb-2 block">Department</label>
              <input type="text" id="pDept" value="HR" readonly class="w-full px-4 py-3 bg-slate-100 rounded-xl" />
            </div>
            <div class="sm:col-span-2">
              <label class="text-sm font-medium text-slate-700 mb-2 block">Address</label>
              <textarea id="pAddress" class="w-full px-4 py-3 border-slate-300 rounded-xl h-24" placeholder="Your address..."></textarea>
            </div>
            <div class="sm:col-span-2 flex justify-end">
              <button type="submit" class="px-8 py-3 bg-indigo-600 text-white font-semibold rounded-xl hover:bg-indigo-700 shadow-lg">Update Profile</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('userName').textContent = user.name || 'Admin';
    document.getElementById('profileName').textContent = user.name || 'Admin User';
    document.getElementById('profileRole').textContent = user.role || 'Admin';
    document.getElementById('avatar').textContent = (user.name || 'A').charAt(0).toUpperCase();
    document.getElementById('pName').value = user.name || '';
    document.getElementById('pEmail').value = user.email || '';

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
      document.getElementById('overlay').classList.toggle('hidden');
    }

    function logout() {
      localStorage.removeItem('ems_auth');
      localStorage.removeItem('ems_user');
      window.location.href = 'index.html';
    }

    document.getElementById('profileForm').addEventListener('submit', function(e) {
      e.preventDefault();

        showToast('Updating profile...', 'success'); // Step 1: Loader toast

      const newUser = {
        name: document.getElementById('pName').value,
        email: document.getElementById('pEmail').value,
        role: user.role
      };
      localStorage.setItem('ems_user', JSON.stringify(newUser));

       await apiCall('/api/profile/update'); 
       showToast('Profile updated successfully! ✅', 'success'); // Step 3: Success toast
       setTimeout(() => location.reload(), 1000); // 1 sec kulla reload
});
  </script>
   <script src="js/app.js"></script>
</body>
</html>
