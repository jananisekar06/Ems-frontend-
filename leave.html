<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMS - Leave Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <!-- Auth Check Inline -->
  <script>
    if(localStorage.getItem('ems_auth')!== 'true' &&!window.location.pathname.includes('index.html')) {
      window.location.href = 'index.html';
    }
    const user = JSON.parse(localStorage.getItem('ems_user') || '{}');
  </script>

  <div class="flex min-h-screen">
    <!-- Mobile Overlay -->
    <div id="overlay" class="hidden lg:hidden fixed inset-0 bg-black/50 z-40" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <div id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 transform -translate-x-full lg:translate-x-0 transition duration-300">
      <div class="p-6 border-b border-slate-700">
        <h2 class="text-2xl font-bold text-white">EMS</h2>
        <p class="text-slate-400 text-sm">Employee System</p>
      </div>
      <nav class="p-4 space-y-2">
        <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800">📊 Dashboard</a>
        <a href="attendance.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800">⏰ Attendance</a>
        <a href="leave.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-indigo-600 text-white">📅 Leave</a>
        <a href="employees.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800">👥 Employees</a>
        <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-slate-800 mt-8">🚪 Logout</button>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 lg:ml-64">
      <!-- Topbar -->
      <div class="topbar px-4 sm:px-8 py-4 bg-white shadow-sm flex justify-between items-center">
        <div class="flex items-center gap-4">
          <button onclick="toggleSidebar()" class="lg:hidden p-2 bg-indigo-600 text-white rounded-lg">☰</button>
          <h2 class="text-xl sm:text-2xl font-bold text-slate-800">Leave Management</h2>
        </div>
        <span class="text-sm sm:text-base text-slate-600">Welcome, <span id="userName">Admin</span></span>
      </div>

      <div class="p-4 sm:p-8">
        <!-- Header with Button -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
          <h1 class="text-2xl sm:text-3xl font-bold text-slate-800">Leave Requests</h1>
          <button onclick="openLeaveModal()" class="w-full sm:w-auto px-6 py-3 bg-indigo-600 text-white font-semibold rounded-xl hover:bg-indigo-700 transition shadow-lg hover:scale-105">
            + Apply Leave
          </button>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full min-w-[600px]">
              <thead class="bg-slate-50">
                <tr>
                  <th class="px-6 py-4 text-left text-sm font-semibold text-slate-600">Emp ID</th>
                  <th class="px-6 py-4 text-left text-sm font-semibold text-slate-600">Name</th>
                  <th class="px-6 py-4 text-left text-sm font-semibold text-slate-600">Leave Type</th>
                  <th class="px-6 py-4 text-left text-sm font-semibold text-slate-600">From</th>
                  <th class="px-6 py-4 text-left text-sm font-semibold text-slate-600">To</th>
                  <th class="px-6 py-4 text-left text-sm font-semibold text-slate-600">Status</th>
                </tr>
              </thead>
              <tbody id="leaveTable" class="divide-y divide-slate-200">
                <tr class="hover:bg-slate-50">
                  <td class="px-6 py-4">EMP002</td>
                  <td class="px-6 py-4 font-medium">Priya S</td>
                  <td class="px-6 py-4">Sick Leave</td>
                  <td class="px-6 py-4">2026-06-18</td>
                  <td class="px-6 py-4">2026-06-20</td>
                  <td class="px-6 py-4"><span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-sm font-medium">Pending</span></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Apply Leave Modal Popup -->
  <div id="leaveModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold text-slate-800">Apply Leave</h3>
        <button onclick="closeLeaveModal()" class="text-slate-400 hover:text-slate-600 text-2xl">×</button>
      </div>

      <form id="leaveForm" class="space-y-4">
        <div>
          <label class="text-sm font-medium text-slate-700 mb-1 block">Employee</label>
          <select id="leaveEmp" class="w-full px-4 py-3 border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-600" required>
            <option value="">Select Employee</option>
            <option value="EMP001|Raj Kumar">Raj Kumar - EMP001</option>
            <option value="EMP002|Priya S">Priya S - EMP002</option>
            <option value="EMP003|Arun M">Arun M - EMP003</option>
          </select>
        </div>

        <div>
          <label class="text-sm font-medium text-slate-700 mb-1 block">Leave Type</label>
          <select id="leaveType" class="w-full px-4 py-3 border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-600" required>
            <option value="">Select Type</option>
            <option>Casual Leave</option>
            <option>Sick Leave</option>
            <option>Annual Leave</option>
            <option>Work From Home</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-sm font-medium text-slate-700 mb-1 block">From Date</label>
            <input type="date" id="fromDate" class="w-full px-4 py-3 border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-600" required />
          </div>
          <div>
            <label class="text-sm font-medium text-slate-700 mb-1 block">To Date</label>
            <input type="date" id="toDate" class="w-full px-4 py-3 border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-600" required />
          </div>
        </div>

        <div>
          <label class="text-sm font-medium text-slate-700 mb-1 block">Reason</label>
          <textarea id="reason" placeholder="Reason for leave..." class="w-full px-4 py-3 border-slate-300 rounded-xl h-24 resize-none focus:ring-2 focus:ring-indigo-600" required></textarea>
        </div>

        <div class="flex gap-3 mt-6">
          <button type="button" onclick="closeLeaveModal()" class="flex-1 py-3 bg-slate-200 text-slate-700 rounded-xl font-semibold hover:bg-slate-300">Cancel</button>
          <button type="submit" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700 shadow-lg">Submit Request</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ALL JS INLINE -->
  <script>
    // Set username
    document.getElementById('userName').textContent = user.name || 'Admin';

    // Sidebar Toggle
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('overlay');
      sidebar.classList.toggle('-translate-x-full');
      overlay.classList.toggle('hidden');
    }

    // Modal Open/Close - Direct functions
    function openLeaveModal() {
      document.getElementById('leaveModal').classList.remove('hidden');
      document.getElementById('leaveForm').reset();
    }

    function closeLeaveModal() {
      document.getElementById('leaveModal').classList.add('hidden');
    }

    // Logout
    function logout() {
      localStorage.removeItem('ems_auth');
      localStorage.removeItem('ems_user');
      window.location.href = 'index.html';
    }

    // Apply Leave Form Submit
    document.getElementById('leaveForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const empData = document.getElementById('leaveEmp').value.split('|');
      const type = document.getElementById('leaveType').value;
      const from = document.getElementById('fromDate').value;
      const to = document.getElementById('toDate').value;
      const reason = document.getElementById('reason').value;

      // Date validation
      if(new Date(from) > new Date(to)) {
        alert('From date cannot be after To date!');
        return;
      }

      // Add new row to table
      const table = document.getElementById('leaveTable');
      const row = table.insertRow(0);
      row.className = 'hover:bg-slate-50';
      row.innerHTML = `
        <td class="px-6 py-4">${empData[0]}</td>
        <td class="px-6 py-4 font-medium">${empData[1]}</td>
        <td class="px-6 py-4">${type}</td>
        <td class="px-6 py-4">${from}</td>
        <td class="px-6 py-4">${to}</td>
        <td class="px-6 py-4"><span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-sm font-medium">Pending</span></td>
      `;

      closeLeaveModal();
      alert('Leave request submitted! Status: Pending');
    });
  </script>
</body>
</html>
