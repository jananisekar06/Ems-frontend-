<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMS - HR Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <script>
    if(localStorage.getItem('ems_auth')!== 'true' &&!window.location.pathname.includes('index.html')) {
      window.location.href = 'index.html';
    }
    const user = JSON.parse(localStorage.getItem('ems_user') || '{}');
  </script>

  <div class="flex min-h-screen">
    <div id="overlay" class="hidden lg:hidden fixed inset-0 bg-black/50 z-40" onclick="toggleSidebar()"></div>

    <div id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 transform -translate-x-full lg:translate-x-0 transition duration-300">
      <div class="p-6 border-b border-slate-700">
        <h2 class="text-2xl font-bold text-white">EMS</h2>
        <p class="text-slate-400 text-sm">Employee System</p>
      </div>
      <nav class="p-4 space-y-2">
        <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800">📊 Dashboard</a>
        <a href="attendance.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800">⏰ Attendance</a>
        <a href="leave.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800">📅 Leave</a>
        <a href="employees.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800">👥 Employees</a>
        <a href="tasks.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800">✅ Tasks</a>
        <a href="hr.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-indigo-600 text-white">💼 HR</a>
        <a href="profile.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800">👤 Profile</a>
        <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-slate-800 mt-8">🚪 Logout</button>
      </nav>
    </div>

    <div class="flex-1 lg:ml-64">
      <div class="topbar px-4 sm:px-8 py-4 bg-white shadow-sm flex justify-between items-center">
        <div class="flex items-center gap-4">
          <button onclick="toggleSidebar()" class="lg:hidden p-2 bg-indigo-600 text-white rounded-lg">☰</button>
          <h2 class="text-xl sm:text-2xl font-bold text-slate-800">HR Management</h2>
        </div>
        <span class="text-sm sm:text-base text-slate-600">Welcome, <span id="userName">Admin</span></span>
      </div>

      <div class="p-4 sm:p-8">
        <h1 class="text-2xl sm:text-3xl font-bold text-slate-800 mb-8">HR Dashboard</h1>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
          <div class="bg-white rounded-2xl p-6 shadow-lg">
            <p class="text-slate-600 text-sm">Total Employees</p>
            <p class="text-3xl font-bold text-indigo-600 mt-2">156</p>
          </div>
          <div class="bg-white rounded-2xl p-6 shadow-lg">
            <p class="text-slate-600 text-sm">On Leave Today</p>
            <p class="text-3xl font-bold text-yellow-600 mt-2">12</p>
          </div>
          <div class="bg-white rounded-2xl p-6 shadow-lg">
            <p class="text-slate-600 text-sm">Pending Approvals</p>
            <p class="text-3xl font-bold text-red-600 mt-2">8</p>
          </div>
          <div class="bg-white rounded-2xl p-6 shadow-lg">
            <p class="text-slate-600 text-sm">Open Tasks</p>
            <p class="text-3xl font-bold text-green-600 mt-2">34</p>
          </div>
        </div>

        <!-- Quick Actions -->
        <div class="bg-white rounded-2xl shadow-lg p-6">
          <h3 class="text-xl font-bold text-slate-800 mb-6">Quick Actions</h3>
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <button onclick="alert('Employee Onboarding form coming soon')" class="p-4 bg-indigo-50 hover:bg-indigo-100 rounded-xl text-left transition">
              <p class="text-2xl mb-2">👤</p>
              <p class="font-semibold text-slate-800">Onboard Employee</p>
            </button>
            <button onclick="alert('Payroll processing coming soon')" class="p-4 bg-green-50 hover:bg-green-100 rounded-xl text-left transition">
              <p class="text-2xl mb-2">💰</p>
              <p class="font-semibold text-slate-800">Process Payroll</p>
            </button>
            <button onclick="alert('Generate report coming soon')" class="p-4 bg-purple-50 hover:bg-purple-100 rounded-xl text-left transition">
              <p class="text-2xl mb-2">📊</p>
              <p class="font-semibold text-slate-800">Generate Report</p>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('userName').textContent = user.name || 'Admin';

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
      document.getElementById('overlay').classList.toggle('hidden');
    }

    function logout() {
      localStorage.removeItem('ems_auth');
      localStorage.removeItem('ems_user');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
