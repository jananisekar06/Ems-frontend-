<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Generator</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

<h1 class="text-3xl font-bold text-indigo-700 mb-6">
🔑 Password Generator
</h1>

<input
id="password"
readonly
class="border w-full p-3 rounded mb-5">

<button
onclick="generatePassword()"
class="bg-indigo-600 text-white w-full p-3 rounded hover:bg-indigo-700">

Generate Password

</button>

</div>

<script>

function generatePassword(){

let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&";

let password="";

for(let i=0;i<10;i++){

password+=chars.charAt(Math.floor(Math.random()*chars.length));

}

document.getElementById("password").value=password;

}

</script>
<script src="js/password.js"></script>
</body>
</html>
