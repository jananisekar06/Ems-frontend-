<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-5xl mx-auto mt-10 bg-white rounded-xl shadow-lg p-8">

<h1 class="text-3xl font-bold text-indigo-700 mb-6">
📊 Reports
</h1>

<div class="grid grid-cols-1 md:grid-cols-3 gap-5">

<div class="bg-blue-500 text-white p-6 rounded-lg">
<h2 class="text-xl font-bold">Employees</h2>
<p id="empCount" class="text-3xl mt-3">0</p>
</div>

<div class="bg-green-500 text-white p-6 rounded-lg">
<h2 class="text-xl font-bold">Attendance</h2>
<p id="attCount" class="text-3xl mt-3">0</p>
</div>

<div class="bg-red-500 text-white p-6 rounded-lg">
<h2 class="text-xl font-bold">Leaves</h2>
<p id="leaveCount" class="text-3xl mt-3">0</p>
</div>

</div>

</div>

<script>
document.getElementById("empCount").innerHTML =
JSON.parse(localStorage.getItem("employees"))?.length || 0;

document.getElementById("attCount").innerHTML =
JSON.parse(localStorage.getItem("attendance"))?.length || 0;

document.getElementById("leaveCount").innerHTML =
JSON.parse(localStorage.getItem("leave"))?.length || 0;
</script>
<script src="js/reports.js"></script>
</body>
</html>
